<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6c584c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vyra">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <title>Vyra</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <div class="header">
    <div class="logo">
      <img class="logo-icon" src="icon22.png" alt="Vyra logo" />
      VYRA
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>

  <nav class="nav" role="tablist" aria-label="Main navigation">
    <button class="nav-btn active" role="tab" aria-selected="true" aria-controls="tab-workouts">WORKOUTS</button>
    <button class="nav-btn" role="tab" aria-selected="false" aria-controls="tab-history">HISTORY</button>
    <button class="nav-btn" role="tab" aria-selected="false" aria-controls="tab-records">RECORDS</button>
  </nav>

  <!-- WORKOUTS TAB -->
  <div class="view active" id="tab-workouts" role="tabpanel">
    <div class="days-header">
      <div class="section-title">YOUR DAYS</div>
    </div>
    <div id="daysList"></div>
    <button class="add-day-btn" data-action-global="add-day">+ ADD WORKOUT DAY</button>
    <div class="data-section">
      <div class="data-section-title">ACCOUNT</div>
      <div id="accountSection"></div>
      <div id="authView"></div>
    </div>
  </div>

  <!-- LOG EXERCISE VIEW -->
  <div class="view" id="tab-log" role="tabpanel">
    <button class="back-btn" data-action-global="go-back" aria-label="Go back">← BACK</button>
    <div class="log-exercise-title" id="logExName"></div>
    <div class="log-day-label" id="logDayLabel"></div>
    <div class="unit-toggle" role="radiogroup" aria-label="Weight unit">
      <button class="unit-btn active" id="unitKg" role="radio" aria-checked="true">KG</button>
      <button class="unit-btn" id="unitLbs" role="radio" aria-checked="false">LBS</button>
    </div>
    <table class="sets-table">
      <thead>
        <tr>
          <th style="width:30px">SET</th>
          <th id="weightHeader">KG</th>
          <th style="padding-left:8px">REPS</th>
          <th><span class="sr-only">Delete</span></th>
        </tr>
      </thead>
      <tbody id="setsBody"></tbody>
    </table>
    <button class="add-set-btn" data-action-global="add-set">+ ADD SET</button>
    <button class="save-btn" id="saveLogBtn">SAVE SESSION</button>
  </div>

  <!-- HISTORY TAB -->
  <div class="view" id="tab-history" role="tabpanel">
    <div class="section-title" style="margin-bottom:16px">PROGRESS LOG</div>
    <div class="history-filter" id="historyFilter"></div>
    <div id="historyList"></div>
  </div>

  <!-- RECORDS TAB -->
  <div class="view" id="tab-records" role="tabpanel">
    <div class="section-title" style="margin-bottom:16px">PERSONAL BESTS</div>
    <div id="recordsList"></div>
  </div>

  <!-- ADD DAY MODAL -->
  <div class="modal-overlay" id="addDayModal" role="dialog" aria-modal="true" aria-labelledby="addDayModalTitle">
    <div class="modal">
      <div class="modal-title" id="addDayModalTitle">NEW WORKOUT DAY</div>
      <input class="modal-input" id="dayNameInput" placeholder="e.g. Day A — Push" maxlength="30" aria-label="Day name" />
      <div class="modal-actions">
        <button class="modal-cancel" data-close="addDayModal">CANCEL</button>
        <button class="modal-confirm" id="confirmAddDayBtn">ADD</button>
      </div>
    </div>
  </div>

  <!-- ADD EXERCISE MODAL -->
  <div class="modal-overlay" id="addExModal" role="dialog" aria-modal="true" aria-labelledby="addExModalTitle">
    <div class="modal">
      <div class="modal-title" id="addExModalTitle">ADD EXERCISE</div>
      <input class="modal-input" id="exNameInput" placeholder="e.g. Bench Press" maxlength="40" aria-label="Exercise name" />
      <div class="modal-actions">
        <button class="modal-cancel" data-close="addExModal">CANCEL</button>
        <button class="modal-confirm" id="confirmAddExBtn">ADD</button>
      </div>
    </div>
  </div>

  <!-- EDIT DAY MODAL -->
  <div class="modal-overlay" id="editDayModal" role="dialog" aria-modal="true" aria-labelledby="editDayModalTitle">
    <div class="modal">
      <div class="modal-title" id="editDayModalTitle">RENAME DAY</div>
      <input class="modal-input" id="editDayNameInput" placeholder="e.g. Day A — Push" maxlength="30" aria-label="New day name" />
      <div class="modal-actions">
        <button class="modal-cancel" data-close="editDayModal">CANCEL</button>
        <button class="modal-confirm" id="confirmEditDayBtn">SAVE</button>
      </div>
    </div>
  </div>

  <!-- EDIT EXERCISE MODAL -->
  <div class="modal-overlay" id="editExModal" role="dialog" aria-modal="true" aria-labelledby="editExModalTitle">
    <div class="modal">
      <div class="modal-title" id="editExModalTitle">RENAME EXERCISE</div>
      <input class="modal-input" id="editExNameInput" placeholder="e.g. Bench Press" maxlength="40" aria-label="New exercise name" />
      <div class="modal-actions">
        <button class="modal-cancel" data-close="editExModal">CANCEL</button>
        <button class="modal-confirm" id="confirmEditExBtn">SAVE</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div class="modal-overlay" id="confirmModal" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMsg">
    <div class="modal">
      <div class="modal-title" id="confirmTitle">CONFIRM</div>
      <div class="modal-confirm-msg" id="confirmMsg"></div>
      <div class="modal-actions">
        <button class="modal-cancel" data-close="confirmModal">CANCEL</button>
        <button class="modal-confirm modal-danger" id="confirmAction">DELETE</button>
      </div>
    </div>
  </div>

  <!-- LONG-PRESS CONTEXT MENU -->
  <div class="context-menu" id="contextMenu" role="menu">
    <button class="context-menu-btn" id="ctxRename" role="menuitem">✎ RENAME</button>
    <button class="context-menu-btn danger" id="ctxDelete" role="menuitem">✕ DELETE</button>
  </div>
  <div class="context-overlay" id="contextOverlay"></div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
