<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6c584c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Overload">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  <title>Overload</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0ead2;
      --surface: #faf7ee;
      --surface2: #dde5b6;
      --border: #c8c0a8;
      --accent: #6c584c;
      --accent-dim: #5a4a3e;
      --text: #3a3028;
      --muted: #a98467;
      --danger: #c45040;
      --up: #6c584c;
      --down: #c45040;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      padding: 24px 20px 12px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
    }

    .header-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* NAV */
    .nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .nav-btn {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
    }

    .nav-btn.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }

    /* VIEWS */
    .view {
      display: none;
      padding: 20px;
    }

    .view.active {
      display: block;
    }

    /* WORKOUT DAYS */
    .days-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
    }

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .day-card:hover {
      border-color: var(--accent);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
    }

    .day-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .day-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .day-header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .day-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .day-action-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .day-action-btn.delete:hover {
      color: var(--danger);
    }

    .day-chevron {
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.2s;
    }

    .day-card.open .day-chevron {
      transform: rotate(180deg);
    }

    .day-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border);
    }

    .day-card.open .day-body {
      display: block;
    }

    .exercise-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .exercise-row:last-child {
      border-bottom: none;
    }

    .exercise-name {
      font-size: 14px;
      font-weight: 500;
    }

    .exercise-last {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .ex-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ex-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 5px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .ex-action-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .ex-action-btn.delete:hover {
      color: var(--danger);
    }

    .ex-arrow {
      color: var(--accent);
      font-size: 14px;
    }

    .add-exercise-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-exercise-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .add-day-btn {
      width: 100%;
      padding: 14px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .add-day-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* LOG VIEW */
    .log-exercise-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .log-day-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .sets-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .sets-table th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 10px;
      text-align: left;
    }

    .sets-table th:last-child {
      text-align: right;
    }

    .set-row td {
      padding: 6px 0;
      vertical-align: middle;
    }

    .set-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      width: 30px;
    }

    .set-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 8px 10px;
      width: 80px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .set-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .set-sep {
      color: var(--muted);
      padding: 0 8px;
      font-size: 12px;
    }

    .set-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      float: right;
      transition: color 0.2s;
    }

    .set-delete:hover {
      color: var(--danger);
    }

    .add-set-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 16px;
      transition: all 0.2s;
    }

    .add-set-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #faf7ee;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover {
      background: var(--accent-dim);
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 20px;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--accent);
    }

    /* HISTORY VIEW */
    .history-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .filter-chip {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #faf7ee;
    }

    .history-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 10px;
    }

    .history-ex-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1.5px;
      margin-bottom: 2px;
    }

    .history-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .history-sets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-set-chip {
      background: var(--surface2);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    .progress-bar-wrap {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .progress-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .progress-label .up {
      color: var(--up);
    }

    .progress-label .down {
      color: var(--down);
    }

    .pbar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .pbar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-confirm {
      flex: 1;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #faf7ee;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
    }

    .modal-cancel {
      flex: 1;
      padding: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
    }

    /* UNIT TOGGLE */
    .unit-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }

    .unit-btn {
      padding: 8px 18px;
      background: var(--surface);
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .unit-btn.active {
      background: var(--accent);
      color: #faf7ee;
    }

    /* DATA MANAGEMENT */
    .data-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .data-section-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .data-btn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .data-btn-export {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .data-btn-export:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .data-btn-import {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .data-btn-import:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* CONFIRM MODAL */
    .modal-confirm-msg {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal-danger {
      background: var(--danger);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #faf7ee;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 12px 24px;
      border-radius: 30px;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">
      <img class="logo-icon" src="logo.png" alt="Overload logo" />
      OVERLOAD
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('workouts')">WORKOUTS</button>
    <button class="nav-btn" onclick="showTab('history')">HISTORY</button>
  </nav>

  <!-- WORKOUTS TAB -->
  <div class="view active" id="tab-workouts">
    <div class="days-header">
      <div class="section-title">YOUR DAYS</div>
    </div>
    <div id="daysList"></div>
    <button class="add-day-btn" onclick="openAddDay()">+ ADD WORKOUT DAY</button>
    <div class="data-section">
      <div class="data-section-title">YOUR DATA</div>
      <button class="data-btn data-btn-export" onclick="exportData()">↓ EXPORT BACKUP</button>
      <button class="data-btn data-btn-import" onclick="document.getElementById('importFile').click()">↑ IMPORT
        BACKUP</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)" />
    </div>
  </div>

  <!-- LOG EXERCISE VIEW (slides in over workouts) -->
  <div class="view" id="tab-log">
    <button class="back-btn" onclick="goBack()">← BACK</button>
    <div class="log-exercise-title" id="logExName"></div>
    <div class="log-day-label" id="logDayLabel"></div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="unitKg" onclick="setUnit('kg')">KG</button>
      <button class="unit-btn" id="unitLbs" onclick="setUnit('lbs')">LBS</button>
    </div>
    <table class="sets-table">
      <thead>
        <tr>
          <th style="width:30px">SET</th>
          <th id="weightHeader">KG</th>
          <th style="padding-left:8px">REPS</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="setsBody"></tbody>
    </table>
    <button class="add-set-btn" onclick="addSet()">+ ADD SET</button>
    <button class="save-btn" onclick="saveLog()">SAVE SESSION</button>
  </div>

  <!-- HISTORY TAB -->
  <div class="view" id="tab-history">
    <div class="section-title" style="margin-bottom:16px">PROGRESS LOG</div>
    <div class="history-filter" id="historyFilter"></div>
    <div id="historyList"></div>
  </div>

  <!-- ADD DAY MODAL -->
  <div class="modal-overlay" id="addDayModal">
    <div class="modal">
      <div class="modal-title">NEW WORKOUT DAY</div>
      <input class="modal-input" id="dayNameInput" placeholder="e.g. Day A — Push" maxlength="30" />
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal('addDayModal')">CANCEL</button>
        <button class="modal-confirm" onclick="confirmAddDay()">ADD</button>
      </div>
    </div>
  </div>

  <!-- ADD EXERCISE MODAL -->
  <div class="modal-overlay" id="addExModal">
    <div class="modal">
      <div class="modal-title">ADD EXERCISE</div>
      <input class="modal-input" id="exNameInput" placeholder="e.g. Bench Press" maxlength="40" />
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal('addExModal')">CANCEL</button>
        <button class="modal-confirm" onclick="confirmAddExercise()">ADD</button>
      </div>
    </div>
  </div>

  <!-- EDIT DAY MODAL -->
  <div class="modal-overlay" id="editDayModal">
    <div class="modal">
      <div class="modal-title">RENAME DAY</div>
      <input class="modal-input" id="editDayNameInput" placeholder="e.g. Day A — Push" maxlength="30" />
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal('editDayModal')">CANCEL</button>
        <button class="modal-confirm" onclick="confirmEditDay()">SAVE</button>
      </div>
    </div>
  </div>

  <!-- EDIT EXERCISE MODAL -->
  <div class="modal-overlay" id="editExModal">
    <div class="modal">
      <div class="modal-title">RENAME EXERCISE</div>
      <input class="modal-input" id="editExNameInput" placeholder="e.g. Bench Press" maxlength="40" />
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal('editExModal')">CANCEL</button>
        <button class="modal-confirm" onclick="confirmEditExercise()">SAVE</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-title" id="confirmTitle">CONFIRM</div>
      <div class="modal-confirm-msg" id="confirmMsg"></div>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal('confirmModal')">CANCEL</button>
        <button class="modal-confirm modal-danger" id="confirmAction" onclick="executeConfirm()">DELETE</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── STATE ───────────────────────────────────────────
    let data = JSON.parse(localStorage.getItem('overload_data') || 'null') || {
      days: [
        { id: 'd1', name: 'Day A', exercises: [{ id: 'e1', name: 'Bench Press' }, { id: 'e2', name: 'Overhead Press' }] },
        { id: 'd2', name: 'Day B', exercises: [{ id: 'e3', name: 'Squat' }, { id: 'e4', name: 'Romanian Deadlift' }] }
      ],
      logs: []  // { id, exerciseId, exerciseName, dayName, date, sets: [{kg, reps}] }
    };

    let currentDayId = null;
    let currentExId = null;
    let currentExName = null;
    let currentDayName = null;
    let addExDayId = null;
    let historyFilter = 'ALL';
    let editDayId = null;
    let editExDayId = null;
    let editExId = null;
    let confirmCallback = null;
    let currentUnit = 'kg';

    function save() { localStorage.setItem('overload_data', JSON.stringify(data)); }

    // ─── DATE ─────────────────────────────────────────────
    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();

    // ─── TABS ─────────────────────────────────────────────
    function showTab(tab) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelectorAll('.nav-btn')[tab === 'workouts' ? 0 : 1].classList.add('active');
      if (tab === 'history') renderHistory();
    }

    function goBack() {
      document.getElementById('tab-log').classList.remove('active');
      document.getElementById('tab-workouts').classList.add('active');
      document.querySelectorAll('.nav-btn')[0].classList.add('active');
    }

    // ─── WORKOUTS ─────────────────────────────────────────
    function renderDays() {
      const el = document.getElementById('daysList');
      if (!data.days.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">💪</div>NO DAYS YET<br>ADD YOUR FIRST WORKOUT DAY</div>';
        return;
      }
      el.innerHTML = data.days.map(day => {
        const exRows = day.exercises.map(ex => {
          const last = getLastLog(ex.id);
          const lastStr = last ? last.sets.map(s => {
            const unit = s.unit || 'kg';
            return `${s.kg}${unit}×${s.reps}`;
          }).join(' · ') : '—';
          return `<div class="exercise-row">
        <div onclick="openLog('${day.id}','${ex.id}','${esc(ex.name)}','${esc(day.name)}')" style="flex:1">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-last">${lastStr}</div>
        </div>
        <div class="ex-right">
          <button class="ex-action-btn" onclick="event.stopPropagation();openEditExercise('${day.id}','${ex.id}')" title="Rename">✎</button>
          <button class="ex-action-btn delete" onclick="event.stopPropagation();deleteExercise('${day.id}','${ex.id}','${esc(ex.name)}')" title="Delete">✕</button>
          <span class="ex-arrow" onclick="openLog('${day.id}','${ex.id}','${esc(ex.name)}','${esc(day.name)}')">→</span>
        </div>
      </div>`;
        }).join('');
        return `<div class="day-card" id="dc-${day.id}">
      <div class="day-header" onclick="toggleDay('${day.id}')">
        <div>
          <div class="day-name">${day.name}</div>
          <div class="day-meta">${day.exercises.length} EXERCISE${day.exercises.length !== 1 ? 'S' : ''}</div>
        </div>
        <div class="day-header-right">
          <button class="day-action-btn" onclick="event.stopPropagation();openEditDay('${day.id}')" title="Rename">✎</button>
          <button class="day-action-btn delete" onclick="event.stopPropagation();deleteDay('${day.id}','${esc(day.name)}')" title="Delete">✕</button>
          <span class="day-chevron">▾</span>
        </div>
      </div>
      <div class="day-body">
        ${exRows || '<div style="color:var(--muted);font-size:13px;padding:12px 0">No exercises yet</div>'}
        <button class="add-exercise-btn" onclick="openAddExercise('${day.id}')">+ ADD EXERCISE</button>
      </div>
    </div>`;
      }).join('');
    }

    function toggleDay(id) {
      document.getElementById('dc-' + id).classList.toggle('open');
    }

    function esc(s) { return s.replace(/'/g, "\\'"); }

    function getLastLog(exId) {
      const logs = data.logs.filter(l => l.exerciseId === exId).sort((a, b) => b.date - a.date);
      return logs[0] || null;
    }

    // ─── LOG EXERCISE ──────────────────────────────────────
    function openLog(dayId, exId, exName, dayName) {
      currentDayId = dayId; currentExId = exId;
      currentExName = exName; currentDayName = dayName;
      document.getElementById('logExName').textContent = exName;
      document.getElementById('logDayLabel').textContent = dayName.toUpperCase() + ' · ' + new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toUpperCase();
      const last = getLastLog(exId);
      const sets = last ? last.sets.map(s => ({ ...s })) : [{ kg: '', reps: '' }, { kg: '', reps: '' }, { kg: '', reps: '' }];
      const unit = last && last.sets[0] && last.sets[0].unit ? last.sets[0].unit : 'kg';
      setUnit(unit);
      renderSets(sets);
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('tab-log').classList.add('active');
    }

    function renderSets(sets) {
      document.getElementById('setsBody').innerHTML = sets.map((s, i) => `
    <tr class="set-row">
      <td class="set-num">${i + 1}</td>
      <td><input class="set-input" type="number" min="0" step="0.5" placeholder="0" value="${s.kg}" /></td>
      <td class="set-sep">×</td>
      <td><input class="set-input" type="number" min="0" step="1" placeholder="0" value="${s.reps}" /></td>
      <td><button class="set-delete" onclick="deleteSet(this)">✕</button></td>
    </tr>`).join('');
    }

    function addSet() {
      const tbody = document.getElementById('setsBody');
      const rows = tbody.querySelectorAll('.set-row');
      const lastKg = rows.length ? rows[rows.length - 1].querySelectorAll('input')[0].value : '';
      const i = rows.length;
      const tr = document.createElement('tr');
      tr.className = 'set-row';
      tr.innerHTML = `
    <td class="set-num">${i + 1}</td>
    <td><input class="set-input" type="number" min="0" step="0.5" placeholder="0" value="${lastKg}" /></td>
    <td class="set-sep">×</td>
    <td><input class="set-input" type="number" min="0" step="1" placeholder="0" /></td>
    <td><button class="set-delete" onclick="deleteSet(this)">✕</button></td>`;
      tbody.appendChild(tr);
      renumberSets();
    }

    function deleteSet(btn) {
      btn.closest('tr').remove();
      renumberSets();
    }

    function renumberSets() {
      document.querySelectorAll('#setsBody .set-num').forEach((el, i) => el.textContent = i + 1);
    }

    function saveLog() {
      const rows = document.querySelectorAll('#setsBody .set-row');
      const sets = [];
      rows.forEach(row => {
        const [kg, reps] = row.querySelectorAll('input');
        if (kg.value !== '' && reps.value !== '') {
          sets.push({ kg: parseFloat(kg.value), reps: parseInt(reps.value), unit: currentUnit });
        }
      });
      if (!sets.length) { showToast('ADD AT LEAST ONE SET'); return; }
      data.logs.push({
        id: Date.now() + '',
        exerciseId: currentExId,
        exerciseName: currentExName,
        dayName: currentDayName,
        date: Date.now(),
        sets
      });
      save();
      renderDays();
      showToast('SESSION SAVED ✓');
      goBack();
    }

    // ─── ADD DAY ──────────────────────────────────────────
    function openAddDay() { document.getElementById('addDayModal').classList.add('open'); document.getElementById('dayNameInput').value = ''; document.getElementById('dayNameInput').focus(); }
    function confirmAddDay() {
      const name = document.getElementById('dayNameInput').value.trim();
      if (!name) return;
      data.days.push({ id: 'd' + Date.now(), name, exercises: [] });
      save(); renderDays(); closeModal('addDayModal');
    }

    // ─── ADD EXERCISE ─────────────────────────────────────
    function openAddExercise(dayId) {
      addExDayId = dayId;
      document.getElementById('addExModal').classList.add('open');
      document.getElementById('exNameInput').value = '';
      document.getElementById('exNameInput').focus();
    }
    function confirmAddExercise() {
      const name = document.getElementById('exNameInput').value.trim();
      if (!name) return;
      const day = data.days.find(d => d.id === addExDayId);
      if (day) day.exercises.push({ id: 'e' + Date.now(), name });
      save(); renderDays(); closeModal('addExModal');
      setTimeout(() => { const dc = document.getElementById('dc-' + addExDayId); if (dc) dc.classList.add('open'); }, 50);
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });

    // Enter key in modals
    document.getElementById('dayNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddDay(); });
    document.getElementById('exNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddExercise(); });
    document.getElementById('editDayNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmEditDay(); });
    document.getElementById('editExNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmEditExercise(); });

    // ─── EDIT DAY ─────────────────────────────────────────
    function openEditDay(dayId) {
      editDayId = dayId;
      const day = data.days.find(d => d.id === dayId);
      if (!day) return;
      document.getElementById('editDayNameInput').value = day.name;
      document.getElementById('editDayModal').classList.add('open');
      document.getElementById('editDayNameInput').focus();
    }
    function confirmEditDay() {
      const name = document.getElementById('editDayNameInput').value.trim();
      if (!name) return;
      const day = data.days.find(d => d.id === editDayId);
      if (day) {
        day.name = name;
        save(); renderDays(); closeModal('editDayModal');
        showToast('DAY RENAMED');
      }
    }

    // ─── DELETE DAY ───────────────────────────────────────
    function deleteDay(dayId, dayName) {
      document.getElementById('confirmTitle').textContent = 'DELETE DAY';
      document.getElementById('confirmMsg').textContent = `Delete "${dayName}" and all its exercises? This cannot be undone.`;
      confirmCallback = () => {
        data.days = data.days.filter(d => d.id !== dayId);
        save(); renderDays(); closeModal('confirmModal');
        showToast('DAY DELETED');
      };
      document.getElementById('confirmModal').classList.add('open');
    }

    // ─── EDIT EXERCISE ────────────────────────────────────
    function openEditExercise(dayId, exId) {
      editExDayId = dayId;
      editExId = exId;
      const day = data.days.find(d => d.id === dayId);
      const ex = day ? day.exercises.find(e => e.id === exId) : null;
      if (!ex) return;
      document.getElementById('editExNameInput').value = ex.name;
      document.getElementById('editExModal').classList.add('open');
      document.getElementById('editExNameInput').focus();
    }
    function confirmEditExercise() {
      const name = document.getElementById('editExNameInput').value.trim();
      if (!name) return;
      const day = data.days.find(d => d.id === editExDayId);
      const ex = day ? day.exercises.find(e => e.id === editExId) : null;
      if (ex) {
        ex.name = name;
        save(); renderDays(); closeModal('editExModal');
        showToast('EXERCISE RENAMED');
      }
    }

    // ─── DELETE EXERCISE ──────────────────────────────────
    function deleteExercise(dayId, exId, exName) {
      document.getElementById('confirmTitle').textContent = 'DELETE EXERCISE';
      document.getElementById('confirmMsg').textContent = `Delete "${exName}"? This cannot be undone.`;
      confirmCallback = () => {
        const day = data.days.find(d => d.id === dayId);
        if (day) day.exercises = day.exercises.filter(e => e.id !== exId);
        save(); renderDays(); closeModal('confirmModal');
        showToast('EXERCISE DELETED');
      };
      document.getElementById('confirmModal').classList.add('open');
    }

    function executeConfirm() {
      if (confirmCallback) { confirmCallback(); confirmCallback = null; }
    }

    // ─── UNIT TOGGLE ──────────────────────────────────────
    function setUnit(unit) {
      currentUnit = unit;
      document.getElementById('unitKg').classList.toggle('active', unit === 'kg');
      document.getElementById('unitLbs').classList.toggle('active', unit === 'lbs');
      document.getElementById('weightHeader').textContent = unit.toUpperCase();
    }

    // ─── HISTORY ──────────────────────────────────────────
    function renderHistory() {
      // Build filter chips
      const names = ['ALL', ...new Set(data.logs.map(l => l.exerciseName))];
      const filterEl = document.getElementById('historyFilter');
      filterEl.innerHTML = names.map(n => `<button class="filter-chip ${historyFilter === n ? 'active' : ''}" onclick="setFilter('${esc(n)}')">${n.toUpperCase()}</button>`).join('');

      const listEl = document.getElementById('historyList');
      let filtered = historyFilter === 'ALL' ? data.logs : data.logs.filter(l => l.exerciseName === historyFilter);
      filtered = [...filtered].sort((a, b) => b.date - a.date);

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>NO HISTORY YET<br>LOG YOUR FIRST SESSION</div>';
        return;
      }

      listEl.innerHTML = filtered.map(log => {
        const prev = getPrevLog(log.exerciseId, log.date);
        const maxKg = Math.max(...log.sets.map(s => s.kg));
        const prevMaxKg = prev ? Math.max(...prev.sets.map(s => s.kg)) : null;
        const totalReps = log.sets.reduce((a, s) => a + s.reps, 0);
        const prevReps = prev ? prev.sets.reduce((a, s) => a + s.reps, 0) : null;
        const diff = prevMaxKg !== null ? maxKg - prevMaxKg : null;
        const repsDiff = prevReps !== null ? totalReps - prevReps : null;
        const chips = log.sets.map((s, i) => `<span class="history-set-chip">${s.kg}${s.unit || 'kg'} × ${s.reps}</span>`).join('');
        const pct = prevMaxKg ? Math.min(100, Math.round((maxKg / (prevMaxKg * 1.5)) * 100)) : 50;

        let progressHTML = '';
        if (prev) {
          const wUnit = log.sets[0] && log.sets[0].unit ? log.sets[0].unit : 'kg';
          const kgLabel = diff > 0 ? `<span class="up">▲ +${diff}${wUnit}</span>` : diff < 0 ? `<span class="down">▼ ${diff}${wUnit}</span>` : `<span>= same weight</span>`;
          const repsLabel = repsDiff > 0 ? `<span class="up">+${repsDiff} reps</span>` : repsDiff < 0 ? `<span class="down">${repsDiff} reps</span>` : `<span>= same reps</span>`;
          progressHTML = `<div class="progress-bar-wrap">
        <div class="progress-label"><span>VS PREV SESSION</span><span>${kgLabel} · ${repsLabel}</span></div>
        <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
      </div>`;
        }

        return `<div class="history-entry">
      <div class="history-ex-name">${log.exerciseName}</div>
      <div class="history-meta">${log.dayName.toUpperCase()} · ${formatDate(log.date).toUpperCase()}</div>
      <div class="history-sets">${chips}</div>
      ${progressHTML}
    </div>`;
      }).join('');
    }

    function getPrevLog(exId, beforeDate) {
      return data.logs
        .filter(l => l.exerciseId === exId && l.date < beforeDate)
        .sort((a, b) => b.date - a.date)[0] || null;
    }

    function setFilter(name) {
      historyFilter = name;
      renderHistory();
    }

    // ─── TOAST ────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ─── EXPORT / IMPORT ──────────────────────────────────
    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'overload-backup-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('BACKUP EXPORTED');
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.days || !Array.isArray(imported.days)) {
            showToast('INVALID BACKUP FILE');
            return;
          }
          document.getElementById('confirmTitle').textContent = 'IMPORT DATA';
          document.getElementById('confirmMsg').textContent = 'This will replace all your current data with the backup. Continue?';
          document.getElementById('confirmAction').textContent = 'IMPORT';
          confirmCallback = () => {
            data = imported;
            save(); renderDays(); closeModal('confirmModal');
            document.getElementById('confirmAction').textContent = 'DELETE';
            showToast('DATA RESTORED');
          };
          document.getElementById('confirmModal').classList.add('open');
        } catch (err) {
          showToast('INVALID BACKUP FILE');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ─── INIT ─────────────────────────────────────────────
    renderDays();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            // Check for updates every 30 minutes while the app is open
            setInterval(() => reg.update(), 30 * 60 * 1000);
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'activated') {
                  showToast('APP UPDATED — RELOADING');
                  setTimeout(() => location.reload(), 1500);
                }
              });
            });
          })
          .catch(err => console.log('SW failed:', err));
      });
    }
  </script>
</body>

</html>
